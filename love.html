<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💌 给你的一封信</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── Floating hearts background ── */
.hearts-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
}

.heart-particle {
  position: absolute;
  animation: floatUp linear infinite;
  opacity: 0;
  font-size: 20px;
}

@keyframes floatUp {
  0%   { transform: translateY(0) rotate(0deg) scale(0); opacity: 0; }
  15%  { opacity: 0.8; }
  85%  { opacity: 0.6; }
  100% { transform: translateY(-105vh) rotate(360deg) scale(1.2); opacity: 0; }
}

/* ── Card ── */
.card {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 36px 28px 32px;
  max-width: 380px;
  width: 90vw;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 30px 80px rgba(0,0,0,0.4);
  animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes cardIn {
  0% { transform: translateY(40px) scale(0.9); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

/* ── Envelope / heart icon ── */
.envelope {
  font-size: 60px;
  margin-bottom: 10px;
  animation: pulse 1.8s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* ── Text ── */
.title {
  color: #ff6b9d;
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: 2px;
}

.subtitle {
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.message {
  color: #e8e8f0;
  font-size: 15px;
  line-height: 2;
  margin-bottom: 24px;
}

.message .highlight {
  color: #ff6b9d;
  font-weight: 700;
  font-size: 17px;
}

.divider {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ff6b9d, transparent);
  margin: 0 auto 22px;
  border-radius: 1px;
}

/* ── Question ── */
.question {
  color: #fff;
  font-size: 19px;
  font-weight: 700;
  margin-bottom: 26px;
  letter-spacing: 1px;
}

/* ── Buttons ── */
.buttons {
  display: flex;
  gap: 16px;
  justify-content: center;
  position: relative;
}

.btn {
  padding: 14px 36px;
  border-radius: 50px;
  border: none;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  letter-spacing: 1px;
  position: relative;
}

.btn-yes {
  background: linear-gradient(135deg, #ff6b9d, #c44dff);
  color: #fff;
  box-shadow: 0 8px 30px rgba(255,107,157,0.4);
  z-index: 2;
}
.btn-yes:active {
  transform: scale(0.95);
  box-shadow: 0 4px 15px rgba(255,107,157,0.6);
}

.btn-no {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.15);
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 1;
}

/* ── Success screen ── */
.success-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.success-overlay.show { display: flex; }

.success-card {
  background: linear-gradient(135deg, #1a1a3e, #2d1b4e);
  border-radius: 28px;
  padding: 40px 30px;
  text-align: center;
  max-width: 350px;
  width: 85vw;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.success-card .big-heart {
  font-size: 80px;
  animation: hugePulse 0.6s ease-in-out infinite alternate;
}

@keyframes hugePulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.2); }
}

.success-card h2 {
  color: #ff6b9d;
  font-size: 28px;
  margin: 12px 0 8px;
}

.success-card p {
  color: rgba(255,255,255,0.7);
  font-size: 15px;
  line-height: 1.8;
}

/* ── Confetti ── */
.confetti {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  0%   { transform: translateY(-100px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}

/* ── Stars ── */
.star {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  animation: twinkle ease-in-out infinite alternate;
  color: rgba(255,255,255,0.5);
}

@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(0.8); }
  100% { opacity: 0.8; transform: scale(1.3); }
}

/* Mobile tweaks */
@media (max-width: 400px) {
  .card { padding: 28px 20px 24px; }
  .title { font-size: 22px; }
  .message { font-size: 14px; line-height: 1.9; }
  .question { font-size: 17px; }
  .btn { padding: 12px 30px; font-size: 15px; }
}
</style>
</head>
<body>

<!-- Flying hearts -->
<div class="hearts-bg" id="hearts-bg"></div>

<!-- Main card -->
<div class="card" id="main-card">
  <div class="envelope">💌</div>
  <div class="title">致 可爱的你</div>
  <div class="subtitle">— 一封蓄谋已久的信 —</div>

  <div class="divider"></div>

  <div class="message">
    <p>认识你以来，</p>
    <p>我的世界好像不一样了 ✨</p>
    <p>你笑起来的样子，</p>
    <p>比我写过的最好代码还要好看。</p>
    <p>你是我最想珍藏的 <span class="highlight">return</span>，</p>
    <p>也是我余生最想执行的 <span class="highlight">while(true)</span>。</p>
  </div>

  <div class="divider"></div>

  <div class="question">💕 做我女朋友好吗？</div>

  <div class="buttons">
    <button class="btn btn-yes" id="btn-yes">好呀 💖</button>
    <button class="btn btn-no" id="btn-no">让我想想</button>
  </div>
</div>

<!-- Success overlay -->
<div class="success-overlay" id="success-overlay">
  <div class="success-card">
    <div class="big-heart">💖</div>
    <h2>你答应了！</h2>
    <p>从今天起，<br>你就是我代码里最甜蜜的注释 💕</p>
    <p style="margin-top:10px; color:#ff6b9d; font-weight:700;">
      2026.06.06 💌
    </p>
  </div>
</div>

<script>
// ── Floating hearts ──
const heartsBg = document.getElementById('hearts-bg');
const heartEmojis = ['💕','💖','💗','💝','💘','❤️','🩷','💓','✨','🌸'];

function spawnHeart() {
  const el = document.createElement('span');
  el.className = 'heart-particle';
  el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  el.style.left = Math.random() * 100 + '%';
  el.style.bottom = '-30px';
  el.style.fontSize = (16 + Math.random() * 28) + 'px';
  el.style.animationDuration = (4 + Math.random() * 8) + 's';
  el.style.animationDelay = Math.random() * 3 + 's';
  heartsBg.appendChild(el);

  // Remove after animation
  setTimeout(() => el.remove(), 12000);
}

// Spawn hearts periodically
setInterval(spawnHeart, 600);
for (let i = 0; i < 12; i++) spawnHeart();

// ── Twinkling stars ──
function createStars() {
  for (let i = 0; i < 30; i++) {
    const star = document.createElement('span');
    star.className = 'star';
    star.textContent = '✦';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.fontSize = (4 + Math.random() * 10) + 'px';
    star.style.animationDuration = (1 + Math.random() * 3) + 's';
    document.body.appendChild(star);
  }
}
createStars();

// ── "No" button: runs away ──
const btnNo = document.getElementById('btn-no');
const btnYes = document.getElementById('btn-yes');
const successOverlay = document.getElementById('success-overlay');

let noClickCount = 0;
const noMessages = [
  '让我想想',
  '真的不再考虑下？',
  '点这里你会后悔的 😢',
  '你真的忍心吗...',
  '再想想嘛~',
  '💔 心碎了',
];

function moveNoButton() {
  const container = btnNo.parentElement;
  const containerRect = container.getBoundingClientRect();
  const btnRect = btnNo.getBoundingClientRect();

  const maxX = containerRect.width - btnRect.width;
  const maxY = containerRect.height - btnRect.height;

  // Move to random position far from current
  let newX = Math.random() * maxX;
  let newY = Math.random() * maxY;

  // Make sure it doesn't overlap with YES button
  const yesRect = btnYes.getBoundingClientRect();
  const yesRelX = yesRect.left - containerRect.left;
  const yesRelY = yesRect.top - containerRect.top;

  while (Math.abs(newX - yesRelX) < 100 && Math.abs(newY - yesRelY) < 60) {
    newX = Math.random() * maxX;
    newY = Math.random() * maxY;
  }

  btnNo.style.position = 'absolute';
  btnNo.style.left = newX + 'px';
  btnNo.style.top = newY + 'px';
}

btnNo.addEventListener('mouseenter', () => {
  if (noClickCount < 5) moveNoButton();
});

btnNo.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (noClickCount < 5) {
    moveNoButton();
    noClickCount++;
    btnNo.textContent = noMessages[Math.min(noClickCount, noMessages.length - 1)];
  }
});

// If they somehow manage to click no
btnNo.addEventListener('click', (e) => {
  e.preventDefault();
  noClickCount++;
  if (noClickCount < 6) {
    btnNo.textContent = noMessages[Math.min(noClickCount, noMessages.length - 1)];
    moveNoButton();
  } else {
    // They're persistent... just show yes too
    btnNo.textContent = '好吧...那就答应吧 😊';
    btnNo.style.background = 'linear-gradient(135deg, #ff6b9d, #c44dff)';
    btnNo.style.color = '#fff';
    setTimeout(() => triggerSuccess(), 500);
  }
});

// ── Yes button: success! ──
btnYes.addEventListener('click', triggerSuccess);
btnYes.addEventListener('touchend', (e) => {
  e.preventDefault();
  triggerSuccess();
});

function triggerSuccess() {
  successOverlay.classList.add('show');
  spawnConfetti();
}

// ── Confetti ──
function spawnConfetti() {
  const colors = ['#ff6b9d','#c44dff','#ffd166','#06d6a0','#118ab2','#ff9f1c','#ef476f'];
  const shapes = ['●','◆','♥','★','✦','⬟'];

  for (let i = 0; i < 120; i++) {
    const el = document.createElement('span');
    el.className = 'confetti';
    el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.top = -(Math.random() * 40) + 'px';
    el.style.fontSize = (10 + Math.random() * 22) + 'px';
    el.style.color = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (2 + Math.random() * 4) + 's';
    el.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(el);

    setTimeout(() => el.remove(), 6000);
  }
}

// ── Tap anywhere on success to close ──
successOverlay.addEventListener('click', () => {
  successOverlay.classList.remove('show');
});
</script>
</body>
</html>
